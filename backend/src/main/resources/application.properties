spring.datasource.url=jdbc:postgresql://localhost:5432/restaurantdb
spring.datasource.username=restaurant_user
# Set SPRING_DATASOURCE_PASSWORD in env for production; default for local dev only
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}
# Set to false in production so default admin/waiter are not created
app.security.create-default-users=true
# Connection pool: handle many customers without exhausting DB connections
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=300000
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Railway/Heroku/Render set PORT; default 8080 for local
server.port=${PORT:8080}
# Handle many concurrent requests (customers browsing, ordering at once)
server.tomcat.threads.max=200
server.tomcat.max-connections=10000
server.tomcat.connection-timeout=20000
# Only enable security debug locally if needed
# logging.level.org.springframework.security=DEBUG

# JWT: override in prod with env JWT_SECRET (min 32 chars for HS256)
app.jwt.secret=${JWT_SECRET:mySecretKeyForJWTGenerationInRestaurantApp12345}
app.jwt.expiration-ms=86400000

# CORS: comma-separated origins; default allows localhost
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:5174,http://127.0.0.1:3000,http://127.0.0.1:5173,http://127.0.0.1:5174}

# Actuator: health for load balancers
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# SendGrid: set SENDGRID_API_KEY in env for order/reservation emails; leave unset to disable
app.notification.sendgrid.api-key=${SENDGRID_API_KEY:}
app.notification.sendgrid.from=${SENDGRID_FROM:niyousha.kh@gmail.com}
app.notification.sendgrid.from-name=Saffron House
# Optional: SendGrid for reservation confirmation emails
# app.notification.sendgrid.api-key=SG.xxx
# app.notification.sendgrid.from=noreply@yourdomain.com
# app.notification.sendgrid.from-name=Your Restaurant

# Stripe (payments). Webhook URL: https://your-api/api/stripe/webhook
# app.stripe.secret-key=sk_test_xxx
# app.stripe.publishable-key=pk_test_xxx
# app.stripe.webhook-secret=whsec_xxx
# Base URL for QR / receipts (e.g. https://your-frontend.com)
app.base-url=${BASE_URL:http://localhost:5173}
