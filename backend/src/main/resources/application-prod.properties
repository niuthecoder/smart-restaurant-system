# Production profile - still H2 but more secure
spring.datasource.url=jdbc:h2:file:./data/restaurantprod;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=  # Consider adding a password

# JPA - production settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console disabled for production
spring.h2.console.enabled=false

# Minimal logging for production
logging.level.com.example.restaurant=INFO

# Actuator for monitoring
management.endpoints.web.exposure.include=health,info