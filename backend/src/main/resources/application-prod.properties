# Production profile: use env vars for secrets and URLs. Activate with SPRING_PROFILES_ACTIVE=prod
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:30}
server.tomcat.threads.max=${TOMCAT_MAX_THREADS:250}
# Required in prod - no default
app.jwt.secret=${JWT_SECRET}
app.cors.allowed-origins=${CORS_ORIGINS}
app.base-url=${BASE_URL}
# Do not create default admin/waiter in production
app.security.create-default-users=false
management.endpoint.health.show-details=never
