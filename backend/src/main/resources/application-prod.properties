# Production profile: use env vars for secrets and URLs. Activate with SPRING_PROFILES_ACTIVE=prod

# --- Database ---
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:30}
spring.datasource.hikari.connection-timeout=10000

# --- Server ---
server.port=${PORT:8080}
server.tomcat.threads.max=${TOMCAT_MAX_THREADS:250}
server.tomcat.connection-timeout=20000
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# --- Auth ---
app.jwt.secret=${JWT_SECRET}
app.security.create-default-users=false

# --- CORS ---
app.cors.allowed-origins=${CORS_ORIGINS}
app.base-url=${BASE_URL}

# --- Actuator ---
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=never

# --- Logging ---
logging.level.root=WARN
logging.level.com.example.restaurant=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
