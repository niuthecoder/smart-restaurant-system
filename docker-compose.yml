# Smart Restaurant System — full stack (PostgreSQL + Backend + Frontend)
# Usage: docker-compose up -d
# Frontend: http://localhost:3000  Backend API: http://localhost:8081  Swagger: http://localhost:8081/swagger-ui.html
#
# For production: use strong secrets via env file (see .env.production.example).
# Example: docker-compose --env-file .env.production up -d

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: restaurantdb
      POSTGRES_USER: restaurant_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-restaurant_secret}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restaurant_user -d restaurantdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8081:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/restaurantdb
      SPRING_DATASOURCE_USERNAME: restaurant_user
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-restaurant_secret}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:8081}
      JWT_SECRET: ${JWT_SECRET:-mySecretKeyForJWTGenerationInRestaurantApp12345}
      BASE_URL: ${BASE_URL:-http://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_ORIGIN=${VITE_API_ORIGIN:-http://localhost:8081}
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
